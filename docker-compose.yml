services: # New Backend Rust service
  oort-db:
    build:
      context: ./db
      dockerfile: Dockerfile
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=oort_cluster
      - CASSANDRA_BROADCAST_RPC_ADDRESS=oort-db
      - HEAP_NEWSIZE=128M
      - MAX_HEAP_SIZE=512M
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  cassandra-init:
    build:
      context: ./db
      dockerfile: Dockerfile
    depends_on:
      oort-db:
        condition: service_healthy
    command: cqlsh oort-db -f /data.cql

  oort-ml:
    build:
      context: ./ml
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    volumes:
      - ./ml/src:/usr/src/app/src # Map source code
      - ./ml/Cargo.toml:/usr/src/app/Cargo.toml
      - ./ml/Cargo.lock:/usr/src/app/Cargo.lock
      - rust_target_cache:/usr/src/app/target # Cache compiled artifacts
      - hf_cache:/root/.cache/huggingface # Cache downloaded models
    environment:
      - RUST_LOG=info
      - GITHUB_TOKEN_FILE=/run/secrets/github_token
      - GITHUB_OWNER=nicolas-ricc
      - LLM_MODEL_REPO=bartowski/Phi-3.5-mini-instruct-GGUF
      - LLM_GGUF_FILES=Phi-3.5-mini-instruct-Q4_K_M.gguf
      - EMBEDDING_MODEL_REPO=Qwen/Qwen3-Embedding-0.6B
      - GPU_ENABLED=true
      - LLM_GPU_UTILIZATION=0.8
      # - LLM_CONTEXT_SIZE=4096  # Fallback if GPU utilization sizing is disabled
      - EMBEDDING_ON_CPU=false
    devices:
      - nvidia.com/gpu=all
    depends_on:
      oort-db:
        condition: service_healthy
    secrets:
      - github_token
  # Frontend React service
  oort-fe-app:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - REACT_APP_API_URL=http://localhost:8000
    depends_on:
      - oort-ml

  grafana:
    image: grafana/grafana-oss
    container_name: grafana
    restart: unless-stopped
    environment:
      - TERM=linux
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-polystat-panel,hadesarchitect-cassandra-datasource
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_BASIC_ENABLED=false
    ports:
      - '3000:3000'
    volumes:
      - 'grafana_storage:/var/lib/grafana'
    depends_on:
      - oort-db


volumes:
  rust_target_cache:
  cassandra_data:
  grafana_storage: {}
  hf_cache:

secrets:
  github_token:
    file: ./github_token.txt
